<svg width="1100" height="550" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2f7"></stop>
      <stop offset="100%" stop-color="#d9e2ec"></stop>
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"></path>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"></rect>

  <!-- SOURCE -->
  <rect x="20" y="120" width="200" height="260" rx="20" fill="#cbd5e1"></rect>
  <text x="120" y="150" text-anchor="middle" font-size="16" font-weight="bold">SOURCE</text>

  <rect x="50" y="200" width="140" height="120" rx="15" fill="#ffffff"></rect>
  <text x="120" y="240" text-anchor="middle" font-size="13">Regras de</text>
  <text x="120" y="260" text-anchor="middle" font-size="13">Negócio</text>

  <!-- INFRA -->
  <rect x="260" y="50" width="200" height="90" rx="20" fill="#60a5fa"></rect>
  <text x="360" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="white">INFRA</text>
  <text x="360" y="105" text-anchor="middle" font-size="12" fill="white">Python Runner</text>
  <text x="360" y="120" text-anchor="middle" font-size="12" fill="white">dotenv</text>

  <!-- ORCHESTRATION -->
  <rect x="480" y="50" width="200" height="90" rx="20" fill="#34d399"></rect>
  <text x="580" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="white">ORCHESTRATION</text>
  <text x="580" y="105" text-anchor="middle" font-size="12" fill="white">Pytest</text>
  <text x="580" y="120" text-anchor="middle" font-size="12" fill="white">pytest-html</text>

  <!-- PROCESS -->
  <rect x="700" y="50" width="360" height="90" rx="20" fill="#a78bfa"></rect>
  <text x="880" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="white">PROCESS</text>
  <text x="880" y="105" text-anchor="middle" font-size="12" fill="white">Selenium • Chrome • IA</text>
  <text x="880" y="120" text-anchor="middle" font-size="12" fill="white">Pandas • OpenPyXL</text>

  <!-- FLOW BAR -->
  <rect x="260" y="160" width="800" height="40" rx="15" fill="#475569"></rect>
  <text x="660" y="185" text-anchor="middle" font-size="14" fill="white">TEST AUTOMATION FLOW</text>

  <!-- FLOW STEPS -->
  <rect x="280" y="230" width="180" height="80" rx="15" fill="#93c5fd"></rect>
  <text x="370" y="270" text-anchor="middle" font-size="13">EXTRACT</text>

  <rect x="500" y="230" width="220" height="80" rx="15" fill="#6ee7b7"></rect>
  <text x="610" y="260" text-anchor="middle" font-size="13">TRANSFORM</text>
  <text x="610" y="280" text-anchor="middle" font-size="12">(IA + Pandas)</text>

  <rect x="760" y="230" width="220" height="80" rx="15" fill="#c4b5fd"></rect>
  <text x="870" y="260" text-anchor="middle" font-size="13">VALIDATE</text>
  <text x="870" y="280" text-anchor="middle" font-size="12">(QA + Selenium)</text>

  <!-- ARROWS -->
  <line x1="220" y1="270" x2="280" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="460" y1="270" x2="500" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="720" y1="270" x2="760" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>

  <!-- OUTPUT -->
  <rect x="820" y="340" width="220" height="110" rx="15" fill="#ffffff"></rect>
  <text x="930" y="380" text-anchor="middle" font-size="13">Relatórios HTML</text>
  <text x="930" y="405" text-anchor="middle" font-size="13">Excel</text>

</svg>