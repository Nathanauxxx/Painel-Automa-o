<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relatorio Simples - Evolucao Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-3">Relatorio Simples - Evolucao Social</h1>
              <p class="text-muted mb-4">Resumo da ultima execucao do Cypress.</p>
              <div class="row g-3">
                <div class="col-6">
                  <div class="p-3 bg-success text-white rounded">Passaram: <strong>1</strong></div>
                </div>
                <div class="col-6">
                  <div class="p-3 bg-danger text-white rounded">Falharam: <strong>0</strong></div>
                </div>
                <div class="col-6">
                  <div class="p-3 bg-secondary text-white rounded">Ignorados: <strong>0</strong></div>
                </div>
                <div class="col-6">
                  <div class="p-3 bg-primary text-white rounded">Total: <strong>1</strong></div>
                </div>
              </div>
              <hr />
              <p class="mb-0">Duracao aproximada: <strong>27s</strong></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
